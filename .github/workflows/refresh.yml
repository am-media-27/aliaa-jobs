name: Refresh hub
on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run refresh
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: npm run refresh
      - name: Commit updated hub
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/state.json index.html mobile.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Daily refresh — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
